# OpenAI (ChatGPT-subscription via LiteLLM) pipeline configuration.
#
# Use with: squadrone scan <slug> --config pipelines/openai.yaml
#
# Auth: LiteLLM's `chatgpt` provider runs its own OAuth device-code flow on
# first use — it does NOT reuse `~/.codex/auth.json` from `codex login`.
# When the first chatgpt/* model call is made, LiteLLM prints a code and
# https://auth.openai.com/codex/device URL; complete the flow once.
#
# Available models (LiteLLM 1.83.14 chatgpt provider registry):
#   chatgpt/gpt-5.4, chatgpt/gpt-5.4,
#   chatgpt/gpt-5.3-codex, chatgpt/gpt-5.3-codex-spark,
#   chatgpt/gpt-5.3-instant, chatgpt/gpt-5.3-chat-latest,
#   chatgpt/gpt-5.2, chatgpt/gpt-5.2-codex,
#   chatgpt/gpt-5.1-codex-max, chatgpt/gpt-5.1-codex-mini
# All route through the Responses API (mode=responses) with function calling
# and structured output supported. No gpt-5.5 and no *-mini in this registry.
#
# Billing: usage counts against the ChatGPT subscription quota, not the API
# dollar balance. The on-disk LiteLLM token-usage numbers may not map cleanly
# to subscription metering — treat reported "$ cost" as advisory only.

cost_ceiling_usd: 2.00
max_hypotheses_to_verify: 10
sandbox_timeout_seconds: 120
verify_max_iterations: 7
developer_calls_per_agent: 7

models:
  # Frontier tier
  critic: chatgpt/gpt-5.4              # Wordfence/Patchstack scope + severity decisions
  developer: chatgpt/gpt-5.4           # WordPress-internals expert + initial sandbox setup
  chain_synthesizer: chatgpt/gpt-5.4   # Cross-specialist exploit-chain reasoning

  # Balanced tier
  specialists: chatgpt/gpt-5.4
  surveyor: chatgpt/gpt-5.4
  poc_author: chatgpt/gpt-5.4

  # Cost-efficient tier
  developer_followup: chatgpt/gpt-5.4    # Structured diagnostic
  reporter: chatgpt/gpt-5.4              # Per-finding markdown formatting
  dedup_fallback: chatgpt/gpt-5.4        # Similarity matching
  hypothesis_verifier: chatgpt/gpt-5.4   # Per-hypothesis source-quote check (highest volume)

llm:
  reasoning_effort: high
  verbosity: high

reasoning:
  critic: high
  developer: high
  chain_synthesizer: high
  specialists: high
  poc_author: high
  hypothesis_verifier: high
  developer_followup: high
  surveyor: high
  reporter: medium
  dedup_fallback: medium

sandbox:
  wordpress_image: wordpress:latest
  db_image: mariadb:10.11
  wp_admin_user: admin
  wp_admin_pass: password
  wp_admin_email: admin@test.local
  wp_url: http://localhost:8080

vuln_dbs:
  wordfence:
    base_url: https://www.wordfence.com/api/intelligence/v2
  wpscan:
    base_url: https://wpscan.com/api/v3

stages:
  - intake
  - recon
  - hypothesis
  - triage
  - verify
  - dedup
  - report

intake:
  bundle_wp_core: false
  classify_files: false
  fetch_changelog: false
  detect_closed: false
  wp_core_version: latest

recon:
  deterministic_analysis: false
  validate_entry_points: false
  trace_cross_file_callees: false
  scan_nonce_emissions: false
  exclude_vendor_tests_lang: false
  enrich_entry_points: false
  negative_pattern_reference: false
  cache_enabled: false
  max_entries_to_validate: 30

hypothesis:
  specialist_grep_read_tools: false
  specialist_wp_idioms: false
  require_branch_enumeration: false
  require_exploit_classification: false
  require_bounty_fit_pretagging: false
  self_critique_pass: false
  iterative_verifier: false
  verifier_max_iterations: 3
  verifier_require_citation: false
  verifier_wp_idioms: false
  verifier_drop_categorisation: false
  verifier_cache_enabled: false
  pre_verifier_dedup: false

triage:
  inject_review_md: false
  cluster_aware: false
  allow_reframing: false
  drift_logging: false
  cache_enabled: false
  review_md_max_chars: 12000

verify:
  headless_browser_check: false
  persistent_sandbox: false
  payload_variants: false
  state_introspection_on_failure: false
  manual_review_handoff: false
  negative_control: false
  collaborative_dev_poc_loop: false
  cache_enabled: false
  payload_variant_cap: 6
  headless_browser_timeout_s: 15

dedup:
  meaningful_scoring: false
  submission_recommendation: false
  review_md_signal: false

report:
  claim_validation_pass: false
  submission_readiness_gate: false
  poc_bundling: false
  screenshot_capture: false
  submission_json: false
